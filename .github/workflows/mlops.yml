name: MLOps Pipeline

"on":
  push:
    branches: [main, master]
    paths:
      - "data/**.dvc"
      - "src/**.py"
      - "tests/**.py"
      - "params.yaml"
      - "requirements.txt"
      - ".github/workflows/mlops.yml"
  workflow_dispatch:

jobs:
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        timeout-minutes: 5
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v

  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        timeout-minutes: 5
        run: pip install -r requirements.txt

      - name: Authenticate to AWS
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> "$GITHUB_ENV"
          echo "AWS_DEFAULT_REGION=${{ secrets.AWS_REGION }}" >> "$GITHUB_ENV"

      - name: Pull data with DVC
        run: dvc pull data/train_phase1.csv.dvc data/eval.csv.dvc

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          ACC=$(python -c "import json; print(json.load(open('outputs/metrics.json'))['accuracy'])")
          echo "accuracy=$ACC" >> "$GITHUB_OUTPUT"
          echo "Accuracy: $ACC"

      - name: Upload model to S3
        run: |
          python - <<'EOF'
          import os
          import boto3

          bucket_name = os.environ["S3_BUCKET"]
          s3 = boto3.client("s3")
          s3.upload_file("models/model.pkl", bucket_name, "models/latest/model.pkl")
          print(f"Uploaded models/model.pkl to s3://{bucket_name}/models/latest/model.pkl")
          EOF
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json

  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:
      - name: Check eval gate
        run: |
          python - <<'EOF'
          acc = float("${{ needs.train.outputs.accuracy }}")
          if acc < 0.70:
              raise SystemExit(f"FAILED: accuracy {acc:.4f} < 0.70. Huy deploy.")
          print(f"PASSED: accuracy {acc:.4f} >= 0.70. Dang trien khai model.")
          EOF

  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo systemctl restart mlops-serve
            for i in 1 2 3 4 5; do
              sleep 5
              if curl -sf http://localhost:8000/health; then
                echo "Health check passed."
                exit 0
              fi
              echo "Waiting for service..."
            done
            sudo journalctl -u mlops-serve -n 50 --no-pager
            exit 1
