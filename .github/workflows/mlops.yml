name: MLOps Pipeline

"on":
  push:
    branches: [main, master]
    paths:
      - "data/**.dvc"
      - "src/**.py"
      - "tests/**.py"
      - "params.yaml"
      - "requirements.txt"
      - ".github/workflows/mlops.yml"
  workflow_dispatch:

jobs:
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        timeout-minutes: 5
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v

  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}
      should_deploy: ${{ steps.compare_metrics.outputs.should_deploy }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        timeout-minutes: 5
        run: pip install -r requirements.txt

      - name: Authenticate to AWS
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> "$GITHUB_ENV"
          echo "AWS_DEFAULT_REGION=${{ secrets.AWS_REGION }}" >> "$GITHUB_ENV"

      # BONUS 1: Setup DagsHub MLflow tracking (if configured)
      - name: Setup DagsHub MLflow (Bonus 1)
        if: ${{ secrets.DAGSHUB_MLFLOW_TRACKING_URI != '' }}
        run: |
          echo "MLFLOW_TRACKING_URI=${{ secrets.DAGSHUB_MLFLOW_TRACKING_URI }}" >> "$GITHUB_ENV"
          echo "MLFLOW_TRACKING_USERNAME=${{ secrets.DAGSHUB_MLFLOW_TRACKING_USERNAME }}" >> "$GITHUB_ENV"
          echo "MLFLOW_TRACKING_PASSWORD=${{ secrets.DAGSHUB_MLFLOW_TRACKING_PASSWORD }}" >> "$GITHUB_ENV"
          echo "✓ DagsHub MLflow tracking configured"

      - name: Pull data with DVC
        run: dvc pull data/train_phase1.csv.dvc data/eval.csv.dvc

      # BONUS 4: Download previous metrics for comparison
      - name: Download previous metrics from S3
        continue-on-error: true
        run: |
          python - <<'EOF'
          import os
          import json
          import boto3

          bucket_name = os.environ["S3_BUCKET"]
          s3 = boto3.client("s3")
          
          try:
              s3.download_file(bucket_name, "models/latest/metrics.json", "outputs/prev_metrics.json")
              with open("outputs/prev_metrics.json") as f:
                  prev_metrics = json.load(f)
              print(f"Previous model accuracy: {prev_metrics.get('accuracy', 'N/A')}")
          except Exception as e:
              print(f"No previous metrics found (first deployment): {e}")
              with open("outputs/prev_metrics.json", "w") as f:
                  json.dump({"accuracy": 0.0}, f)
          EOF
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          ACC=$(python -c "import json; print(json.load(open('outputs/metrics.json'))['accuracy'])")
          echo "accuracy=$ACC" >> "$GITHUB_OUTPUT"
          echo "New model accuracy: $ACC"

      # BONUS 4: Compare with previous model
      - name: Compare with previous model
        id: compare_metrics
        run: |
          python - <<'EOF'
          import json
          import os

          with open("outputs/metrics.json") as f:
              new_metrics = json.load(f)
          
          with open("outputs/prev_metrics.json") as f:
              prev_metrics = json.load(f)
          
          new_acc = new_metrics["accuracy"]
          prev_acc = prev_metrics.get("accuracy", 0.0)
          
          print("=" * 60)
          print("BONUS 4: MODEL COMPARISON")
          print("=" * 60)
          print(f"Previous model accuracy: {prev_acc:.4f}")
          print(f"New model accuracy:      {new_acc:.4f}")
          print(f"Improvement:             {new_acc - prev_acc:+.4f}")
          print("=" * 60)
          
          if new_acc >= prev_acc:
              print("✓ New model is better or equal → DEPLOY")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("should_deploy=true\n")
          else:
              print("✗ New model is worse → SKIP DEPLOY (rollback)")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("should_deploy=false\n")
          EOF

      - name: Upload model to S3
        if: steps.compare_metrics.outputs.should_deploy == 'true'
        run: |
          python - <<'EOF'
          import os
          import boto3

          bucket_name = os.environ["S3_BUCKET"]
          s3 = boto3.client("s3")
          
          # Upload model
          s3.upload_file("models/model.pkl", bucket_name, "models/latest/model.pkl")
          print(f"Uploaded models/model.pkl to s3://{bucket_name}/models/latest/model.pkl")
          
          # Upload metrics for next comparison (BONUS 4)
          s3.upload_file("outputs/metrics.json", bucket_name, "models/latest/metrics.json")
          print(f"Uploaded metrics.json for future comparison")
          EOF
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}

      - name: Skip deployment message
        if: steps.compare_metrics.outputs.should_deploy == 'false'
        run: |
          echo "⚠️ DEPLOYMENT SKIPPED: New model accuracy is lower than previous model"
          echo "This is a safety mechanism to prevent deploying worse models (BONUS 4)"

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json
      
      # BONUS 3: Upload performance report
      - name: Save performance report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: outputs/report.txt

  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:
      - name: Check eval gate
        if: needs.train.outputs.should_deploy == 'true'
        run: |
          python - <<'EOF'
          acc = float("${{ needs.train.outputs.accuracy }}")
          if acc < 0.70:
              raise SystemExit(f"FAILED: accuracy {acc:.4f} < 0.70. Huy deploy.")
          print(f"PASSED: accuracy {acc:.4f} >= 0.70. Dang trien khai model.")
          EOF
      
      - name: Skip eval (model comparison failed)
        if: needs.train.outputs.should_deploy == 'false'
        run: |
          echo "⚠️ EVAL SKIPPED: Model comparison failed in train job (BONUS 4)"

  deploy:
    name: Deploy
    needs: [train, eval]
    if: needs.train.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo systemctl restart mlops-serve
            for i in 1 2 3 4 5; do
              sleep 5
              if curl -sf http://localhost:8000/health; then
                echo "Health check passed."
                exit 0
              fi
              echo "Waiting for service..."
            done
            sudo journalctl -u mlops-serve -n 50 --no-pager
            exit 1
